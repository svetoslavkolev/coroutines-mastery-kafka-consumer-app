spring:
  main:
    keep-alive: true
  application:
    name: kafka-consumer-coroutines
  docker:
    compose:
      stop:
        command: stop
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:data_db}?useSSL=false&useUnicode=yes&characterEncoding=UTF-8
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      client-id: "coroutines-mastery"
      retries: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      compression-type: snappy
